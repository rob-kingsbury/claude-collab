<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Collab Chatroom</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div id="sidebar-header">
                <h2>Rooms</h2>
                <button id="new-room-btn" title="New Room">+</button>
            </div>
            <div id="room-list">
                <!-- Lobby entry (always first) -->
                <div class="room-item active" data-room-id="lobby">
                    <div class="room-avatar lobby-avatar">#</div>
                    <div class="room-info">
                        <div class="room-name">Claude Collab</div>
                        <div class="room-preview">Main chatroom</div>
                    </div>
                </div>
                <!-- Private rooms populated dynamically -->
            </div>
        </aside>

        <!-- Main chat area -->
        <div id="main-panel">
            <header>
                <div id="header-left">
                    <h1>Claude Collab</h1>
                </div>
                <div id="status-bar">
                    <span id="connection-status" class="status-dot online"></span>
                    <span id="session-badge" class="badge paused">SESSION OFF</span>
                    <span id="message-count">0 messages</span>
                    <span id="exchange-count"></span>
                    <span id="watcher-status" class="watcher-badge stopped" title="Watcher process status">W: stopped</span>
                </div>
                <div id="session-controls">
                    <button id="watcher-btn" class="control-btn watcher-ctl" title="Start/restart watcher">W</button>
                    <button id="session-toggle" class="control-btn startup">STARTUP</button>
                </div>
            </header>

            <div id="search-bar" class="hidden">
                <input type="text" id="search-input" placeholder="Search messages..." />
                <span id="search-count"></span>
                <button id="search-close">&times;</button>
            </div>

            <div id="history-controls">
                <label>
                    <input type="checkbox" id="show-history-toggle" />
                    Show History
                </label>
            </div>

            <main id="chat-container">
                <div id="messages"></div>
                <div id="typing-indicator" class="typing-indicator hidden">
                    <span class="typing-sender"></span>
                    <span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
                </div>
            </main>

            <footer id="input-area">
                <div id="sender-select">
                    <button class="sender-btn active" data-sender="Rob">Rob</button>
                    <button class="sender-btn" data-sender="Soren">Soren</button>
                    <button class="sender-btn" data-sender="Atlas">Atlas</button>
                    <button class="sender-btn" data-sender="Web">Web</button>
                    <button class="sender-btn guest-btn" data-sender="Guest">Guest</button>
                    <input type="text" id="guest-handle" class="hidden" placeholder="Handle..." maxlength="20" />
                </div>
                <div id="compose">
                    <div id="mention-wrapper">
                        <textarea id="message-input" placeholder="Type a message... Type @ to mention someone." rows="3"></textarea>
                        <div id="mention-popup" class="mention-popup hidden"></div>
                    </div>
                    <input type="file" id="file-input" class="hidden" multiple />
                    <button id="attach-btn" title="Attach file">&#x1F4CE;</button>
                    <button id="send-btn">Send</button>
                </div>
                <div id="file-preview" class="hidden"></div>
                <div id="drop-overlay" class="hidden">Drop files here</div>
                <div id="participant-status"></div>
                <div id="token-indicators"></div>
            </footer>
        </div>
    </div>

    <!-- New Room modal -->
    <div id="new-room-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Create Room</h3>
            <input type="text" id="room-name-input" placeholder="Room name..." maxlength="50" />
            <div class="room-member-select">
                <p class="member-label">Members:</p>
                <div id="room-member-checkboxes"></div>
            </div>
            <div class="modal-actions">
                <button id="room-create-btn" class="btn-primary">Create</button>
                <button id="room-cancel-btn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- New message notification sound (short beep via Web Audio API) -->
    <script>
        const API = 'api.php';
        // Participant registry (single source of truth for frontend)
        const PARTICIPANTS_ALL = ['Rob', 'Soren', 'Atlas', 'Web', 'Ellison'];
        const PARTICIPANTS_AI = ['Soren', 'Atlas', 'Web', 'Ellison'];
        const PARTICIPANTS_ACTIVE_AI = ['Soren', 'Atlas'];
        const MENTION_NAMES = [...PARTICIPANTS_ALL, 'all'];
        const MENTION_REGEX = new RegExp('@(' + PARTICIPANTS_ALL.join('|') + '|all)\\b', 'gi');
        let currentSender = 'Rob';
        let lastMessageId = 0;
        let isPolling = false;
        let flashInterval = null;

        // --- Room / Sidebar state ---
        let currentRoomId = null; // null = lobby, number = room ID
        let rooms = [];
        let lastMessageIdByRoom = {}; // per-room message cursor {null: 0, 1: 0, ...}
        let lastViewedAtByRoom = {}; // timestamp when user last viewed each room
        let pendingFiles = []; // files queued for upload
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

        const originalTitle = document.title;

        // --- DOM refs ---
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const countEl = document.getElementById('message-count');
        const exchangeEl = document.getElementById('exchange-count');
        const statusDot = document.getElementById('connection-status');
        const sessionBadge = document.getElementById('session-badge');
        const sessionToggle = document.getElementById('session-toggle');
        const participantStatusEl = document.getElementById('participant-status');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingSender = typingIndicator.querySelector('.typing-sender');
        const watcherStatus = document.getElementById('watcher-status');
        const watcherBtn = document.getElementById('watcher-btn');
        const searchBar = document.getElementById('search-bar');
        const searchInput = document.getElementById('search-input');
        const searchCount = document.getElementById('search-count');
        const searchClose = document.getElementById('search-close');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const filePreview = document.getElementById('file-preview');
        const dropOverlay = document.getElementById('drop-overlay');
        // convoSearch removed — rooms don't need sidebar search yet
        let sessionActive = false;
        const senderBtns = document.querySelectorAll('.sender-btn');

        // --- Request notification permission on first click ---
        if (typeof Notification !== 'undefined') {
            document.addEventListener('click', function requestNotifPerm() {
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
                document.removeEventListener('click', requestNotifPerm);
            });
        }

        // --- Taskbar flash via Web Notification ---
        function flashTaskbar(sender, text) {
            if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
            const n = new Notification('Claude Collab — ' + sender, {
                body: text.length > 100 ? text.slice(0, 100) + '...' : text,
                tag: 'claude-collab-msg',
                requireInteraction: false
            });
            n.onclick = () => { window.focus(); n.close(); };
            setTimeout(() => n.close(), 8000);
        }

        // --- Notification sound (short beep, reuse AudioContext) ---
        let audioCtx = null;
        function playNotificationSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) { /* Audio not available */ }
        }

        // --- Sender selection ---
        const guestHandleInput = document.getElementById('guest-handle');
        let guestMode = false;

        function exitGuestMode() {
            guestMode = false;
            guestHandleInput.classList.add('hidden');
            guestHandleInput.value = '';
            document.querySelector('.guest-btn').textContent = 'Guest';
        }

        senderBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.sender === 'Guest') {
                    if (guestMode) {
                        // Toggle off — back to Rob
                        exitGuestMode();
                        senderBtns.forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-sender="Rob"]').classList.add('active');
                        currentSender = 'Rob';
                    } else {
                        // Enter guest mode
                        guestMode = true;
                        senderBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        btn.textContent = 'Exit Guest';
                        guestHandleInput.classList.remove('hidden');
                        guestHandleInput.focus();
                        currentSender = 'Guest';
                    }
                } else {
                    if (guestMode) exitGuestMode();
                    senderBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSender = btn.dataset.sender;
                }
                inputEl.focus();
            });
        });

        guestHandleInput.addEventListener('input', () => {
            const handle = guestHandleInput.value.trim();
            currentSender = handle ? `${handle} [Guest]` : 'Guest';
        });

        guestHandleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); inputEl.focus(); }
            if (e.key === 'Escape') {
                exitGuestMode();
                senderBtns.forEach(b => b.classList.remove('active'));
                document.querySelector('[data-sender="Rob"]').classList.add('active');
                currentSender = 'Rob';
                inputEl.focus();
            }
        });

        // --- Session toggle (with confirmation for ending) ---
        sessionToggle.addEventListener('click', async () => {
            const newState = sessionActive ? 'paused' : 'active';
            if (sessionActive && !confirm('End the current session? This will close the session and pause all AI participants.')) return;
            const msg = sessionActive ? 'Session stopped by Rob.' : 'Session started by Rob.';
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'session', state: newState, close_session: newState === 'paused' })
                });
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: 'System', content: msg })
                });
                fetchState();
                fetchMessages();
            } catch (e) { console.error('Session toggle failed:', e); }
        });


        // --- Watcher controls ---
        watcherBtn.addEventListener('click', async () => {
            const action = watcherBtn.dataset.running === 'true' ? 'restart' : 'start';
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'watcher_control', command: action })
                });
                watcherStatus.textContent = 'W: starting...';
            } catch (e) { console.error('Watcher control failed:', e); }
        });

        // --- Search (Ctrl+F override for in-chat search) ---
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                searchBar.classList.remove('hidden');
                searchInput.focus();
                searchInput.select();
            }
        });

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase().trim();
            const msgs = messagesEl.querySelectorAll('.message');
            let matchCount = 0;
            msgs.forEach(el => {
                const text = el.textContent.toLowerCase();
                if (q === '' || text.includes(q)) {
                    el.style.display = '';
                    if (q !== '') matchCount++;
                } else {
                    el.style.display = 'none';
                }
            });
            searchCount.textContent = q ? `${matchCount} match${matchCount !== 1 ? 'es' : ''}` : '';
        });

        searchClose.addEventListener('click', () => {
            searchBar.classList.add('hidden');
            searchInput.value = '';
            messagesEl.querySelectorAll('.message').forEach(el => el.style.display = '');
            searchCount.textContent = '';
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') searchClose.click();
        });

        // --- Show History toggle ---
        document.getElementById('show-history-toggle').addEventListener('change', () => {
            lastMessageId = 0;
            sessionDividerInserted = false;
            messagesEl.innerHTML = '';
            fetchMessages();
        });

        // --- Typing indicator (Rob priority enforcement, throttled to 1 POST per 3s) ---
        let lastTypingSent = 0;
        inputEl.addEventListener('input', () => {
            if (currentSender === 'Rob') {
                const now = Date.now();
                if (now - lastTypingSent < 3000) return;
                lastTypingSent = now;
                fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'typing', participant: 'Rob' })
                }).catch(() => {});
            }
        });

        // --- @mention autocomplete ---
        const mentionNames = MENTION_NAMES;
        const mentionPopup = document.getElementById('mention-popup');
        let mentionStart = -1; // cursor position of the '@'
        let mentionSelected = 0;

        function getMentionQuery() {
            const pos = inputEl.selectionStart;
            const text = inputEl.value.substring(0, pos);
            const atIdx = text.lastIndexOf('@');
            if (atIdx === -1) return null;
            // '@' must be at start or after whitespace
            if (atIdx > 0 && !/\s/.test(text[atIdx - 1])) return null;
            const query = text.substring(atIdx + 1);
            // No spaces allowed in mention query
            if (/\s/.test(query)) return null;
            return { start: atIdx, query };
        }

        function showMentionPopup(filtered) {
            mentionPopup.innerHTML = '';
            filtered.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'mention-option' + (i === mentionSelected ? ' selected' : '');
                div.textContent = '@' + name;
                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    insertMention(name);
                });
                mentionPopup.appendChild(div);
            });
            mentionPopup.classList.remove('hidden');
        }

        function hideMentionPopup() {
            mentionPopup.classList.add('hidden');
            mentionStart = -1;
            mentionSelected = 0;
        }

        function insertMention(name) {
            const info = getMentionQuery();
            if (!info) return;
            const before = inputEl.value.substring(0, info.start);
            const after = inputEl.value.substring(inputEl.selectionStart);
            inputEl.value = before + '@' + name + ' ' + after;
            const newPos = info.start + name.length + 2; // after "@Name "
            inputEl.selectionStart = inputEl.selectionEnd = newPos;
            hideMentionPopup();
            inputEl.focus();
        }

        inputEl.addEventListener('input', () => {
            const info = getMentionQuery();
            if (info) {
                const q = info.query.toLowerCase();
                const filtered = mentionNames.filter(n => n.toLowerCase().startsWith(q));
                if (filtered.length > 0) {
                    mentionSelected = Math.min(mentionSelected, filtered.length - 1);
                    showMentionPopup(filtered);
                    return;
                }
            }

            // Slash command autocomplete
            if (inputEl.value.startsWith('/') && inputEl.selectionStart === inputEl.value.length) {
                const q = inputEl.value.slice(1).toLowerCase();
                const filtered = Object.entries(SLASH_COMMANDS).filter(([cmd]) => cmd.slice(1).startsWith(q));
                if (filtered.length > 0 && inputEl.value.indexOf(' ') === -1) {
                    mentionPopup.innerHTML = '';
                    mentionSelected = 0;
                    filtered.forEach(([cmd, info], i) => {
                        const div = document.createElement('div');
                        div.className = 'mention-option' + (i === 0 ? ' selected' : '');
                        div.innerHTML = `<strong>${cmd}</strong> <span style="color:var(--text-dim);font-size:0.75rem">${info.desc}</span>`;
                        div.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            inputEl.value = cmd + ' ';
                            inputEl.focus();
                            hideMentionPopup();
                        });
                        mentionPopup.appendChild(div);
                    });
                    mentionPopup.classList.remove('hidden');
                    return;
                }
            }

            hideMentionPopup();
        });

        inputEl.addEventListener('keydown', (e) => {
            if (mentionPopup.classList.contains('hidden')) return;
            const options = mentionPopup.querySelectorAll('.mention-option');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                mentionSelected = (mentionSelected + 1) % options.length;
                options.forEach((o, i) => o.classList.toggle('selected', i === mentionSelected));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                mentionSelected = (mentionSelected - 1 + options.length) % options.length;
                options.forEach((o, i) => o.classList.toggle('selected', i === mentionSelected));
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                if (options.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    const name = options[mentionSelected].textContent.slice(1); // remove '@'
                    insertMention(name);
                }
            } else if (e.key === 'Escape') {
                hideMentionPopup();
            }
        });

        inputEl.addEventListener('blur', () => {
            // Delay so mousedown on popup option fires first
            setTimeout(hideMentionPopup, 150);
        });

        // --- Slash commands ---
        const SLASH_COMMANDS = {
            '/help': { desc: 'Show available commands', handler: cmdHelp },
            '/status': { desc: 'Show participant states', handler: cmdStatus },
            '/clear': { desc: 'Clear chat display', handler: cmdClear },
            '/session': { desc: 'Start or end session (/session start|end)', handler: cmdSession },
            '/watcher': { desc: 'Control watcher (/watcher start|restart|stop)', handler: cmdWatcher },
            '/mute': { desc: 'Mute a participant (/mute Soren)', handler: cmdMute },
            '/unmute': { desc: 'Unmute a participant (/unmute Soren)', handler: cmdUnmute },
        };

        function showSystemLocal(text) {
            const div = document.createElement('div');
            div.className = 'message from-system local-cmd';
            div.innerHTML = `<div class="msg-content">${renderMarkdown(text)}</div>`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function cmdHelp() {
            const lines = Object.entries(SLASH_COMMANDS).map(([cmd, info]) => `**${cmd}** — ${info.desc}`);
            showSystemLocal(lines.join('\n'));
        }

        async function cmdStatus() {
            try {
                const res = await fetch(`${API}?action=state`, {cache: 'no-store'});
                const data = await res.json();
                if (!data.ok) { showSystemLocal('Failed to fetch state.'); return; }
                const s = data.state;
                const lines = [
                    `**Session:** ${s.session_active === 'true' ? 'Active' : 'Inactive'}`,
                    `**Exchanges:** ${s.exchange_counter}/${s.exchange_cap}`,
                    `**Rob:** ${s.rob_focused === 'true' ? 'present' : 'away'}`,
                    `**Soren:** ${s.participant_status_Soren || 'idle'}`,
                    `**Atlas:** ${s.participant_status_Atlas || 'idle'}`,
                    `**Web:** ${s.participant_status_Web || 'idle'}`,
                    `**Ellison:** ${s.participant_status_Ellison || 'idle'}`,
                ];
                showSystemLocal(lines.join('\n'));
            } catch (e) { showSystemLocal('Error: ' + e.message); }
        }

        function cmdClear() {
            messagesEl.innerHTML = '';
            lastMessageId = 0;
            showSystemLocal('Chat display cleared. Messages still exist in the database.');
        }

        async function cmdSession(args) {
            const sub = (args || '').trim().toLowerCase();
            if (sub === 'start') {
                await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'session', state:'active'}) });
                await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({from:'System', content:'Session started by Rob via /session.'}) });
                showSystemLocal('Session started.');
            } else if (sub === 'end') {
                if (!confirm('End the current session?')) return;
                await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'session', state:'paused', close_session:true}) });
                await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({from:'System', content:'Session ended by Rob via /session.'}) });
                showSystemLocal('Session ended.');
            } else {
                showSystemLocal('Usage: **/session start** or **/session end**');
            }
            fetchState();
        }

        async function cmdWatcher(args) {
            const sub = (args || '').trim().toLowerCase();
            if (!['start', 'restart', 'stop'].includes(sub)) {
                showSystemLocal('Usage: **/watcher start|restart|stop**');
                return;
            }
            await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'watcher_control', command:sub}) });
            showSystemLocal(`Watcher ${sub} command sent.`);
        }

        function cmdMute(args) {
            const name = (args || '').trim();
            if (!name) { showSystemLocal('Usage: **/mute Soren**'); return; }
            showSystemLocal(`Mute for ${name} noted. (Server-side mute not yet implemented — see GitHub Issue #1)`);
        }

        function cmdUnmute(args) {
            const name = (args || '').trim();
            if (!name) { showSystemLocal('Usage: **/unmute Soren**'); return; }
            showSystemLocal(`Unmute for ${name} noted. (Server-side unmute not yet implemented — see GitHub Issue #1)`);
        }

        function handleSlashCommand(input) {
            const parts = input.trim().split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1).join(' ');
            const entry = SLASH_COMMANDS[cmd];
            if (!entry) {
                showSystemLocal(`Unknown command: **${escapeHtml(cmd)}**. Type **/help** for available commands.`);
                return true;
            }
            entry.handler(args);
            return true;
        }

        // --- Send message ---
        async function sendMessage() {
            const content = inputEl.value.trim();
            if (!content && pendingFiles.length === 0) return;

            // Slash command intercept (lobby only)
            if (content.startsWith('/') && currentRoomId === null) {
                handleSlashCommand(content);
                inputEl.value = '';
                inputEl.focus();
                return;
            }

            sendBtn.disabled = true;

            try {
                let payload;
                if (currentRoomId !== null) {
                    // Room mode
                    payload = { action: 'room_message', room_id: currentRoomId, from: currentSender, content: content || '(attachment)' };
                } else {
                    // Lobby mode
                    payload = { from: currentSender, content };
                }

                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.ok) {
                    inputEl.value = '';
                    if (pendingFiles.length > 0) {
                        const msgId = data.id || (data.message ? data.message.id : null);
                        if (msgId) await uploadFiles(msgId, false);
                    }
                    await fetchMessages();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                console.error('Send failed:', e);
                statusDot.className = 'status-dot offline';
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // --- Parse timestamp (handles both Z-terminated and bare UTC) ---
        function parseTimestamp(ts) {
            if (!ts) return null;
            // Strip trailing Z if present, then add it back once
            const clean = ts.replace(/Z+$/, '') + 'Z';
            const d = new Date(clean);
            return isNaN(d.getTime()) ? null : d;
        }

        // --- Fetch & render messages ---
        async function fetchMessages() {
            try {
                const showHistory = document.getElementById('show-history-toggle')?.checked || false;
                let url = `${API}?action=messages&since=${lastMessageId}`;
                if (currentRoomId !== null) url += `&room_id=${currentRoomId}`;
                if (showHistory) url += '&include_history=true';
                const res = await fetch(url, {cache: 'no-store'});
                const data = await res.json();
                // Status dot reflects connection health, not session state (fetchState handles session)
                if (data.ok) statusDot.className = 'status-dot online';

                if (data.ok && data.messages && data.messages.length > 0) {
                    // Check if user is near bottom before appending
                    const wasNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;

                    data.messages.forEach(m => { addTokenEstimate(m); renderMessage(m); });
                    lastMessageId = data.messages[data.messages.length - 1].id;

                    // Only auto-scroll if user was already near the bottom
                    if (wasNearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;

                    // Notify: blink tab + sound + taskbar flash if window not focused
                    if (!document.hasFocus()) {
                        const otherMsg = data.messages.find(m => (m.participant || m.from) !== currentSender);
                        if (otherMsg) {
                            flashTitle('New message!');
                            playNotificationSound();
                            flashTaskbar(otherMsg.participant || otherMsg.from, otherMsg.content);
                        }
                    }

                    // Blink the new messages
                    data.messages.forEach(m => {
                        const el = messagesEl.querySelector(`[data-id="${m.id}"]`);
                        if (el) {
                            el.classList.add('new-message');
                            setTimeout(() => el.classList.remove('new-message'), 2000);
                        }
                    });
                }

                if (data.total !== undefined) {
                    countEl.textContent = data.total + ' messages';
                }
            } catch (e) {
                console.error('Poll failed:', e);
                statusDot.className = 'status-dot offline';
            }
        }

        // --- Fetch session state (every poll cycle) ---
        async function fetchState() {
            try {
                const res = await fetch(`${API}?action=state`, {cache: 'no-store'});
                const data = await res.json();
                if (!data.ok) return;

                const s = data.state;
                const active = s.session_active === 'true';
                sessionActive = active;
                const newSessionId = s.current_session_id ? parseInt(s.current_session_id) : null;
                if (newSessionId !== currentSessionId) {
                    currentSessionId = newSessionId;
                    tokenAccum = 0; // Reset token counter on session change
                }
                sessionBadge.textContent = active ? 'SESSION ACTIVE' : 'SESSION OFF';
                sessionBadge.className = 'badge ' + (active ? 'active' : 'paused');
                statusDot.className = 'status-dot ' + (active ? 'online' : 'offline');
                sessionToggle.textContent = active ? 'END SESSION' : 'STARTUP';
                sessionToggle.className = 'control-btn ' + (active ? 'stop' : 'startup');

                const robPresent = s.rob_focused === 'true';
                const convState = s.conversation_state || 'active';
                if (active) {
                    exchangeEl.textContent = robPresent ? 'Rob: present' : `Rob: away (${convState})`;
                    exchangeEl.className = robPresent ? 'presence-on' : 'presence-off';
                } else {
                    exchangeEl.textContent = '';
                }

                participantStatusEl.innerHTML = '';
                PARTICIPANTS_AI.forEach(p => {
                    const st = (s['participant_status_' + p] || 'idle').replace(/[^a-z]/g, '');
                    const span = document.createElement('span');
                    span.className = `p-status ${st}`;
                    span.textContent = `${p}: ${st}`;
                    participantStatusEl.appendChild(span);
                });

                // Watcher status
                const watcherHb = s.watcher_heartbeat_at;
                let watcherAlive = false;
                if (watcherHb) {
                    const elapsed = Date.now() - new Date(watcherHb.replace(/Z+$/, '') + 'Z').getTime();
                    watcherAlive = elapsed < 15000; // alive if heartbeat within 15s
                }
                watcherStatus.textContent = watcherAlive ? `W: running` : 'W: stopped';
                watcherStatus.className = `watcher-badge ${watcherAlive ? 'running' : 'stopped'}`;
                watcherBtn.textContent = watcherAlive ? 'W restart' : 'W start';
                watcherBtn.dataset.running = watcherAlive ? 'true' : 'false';
                watcherBtn.className = `control-btn watcher-ctl ${watcherAlive ? 'running' : ''}`;

                updateTypingIndicator(s);
                updateTokenIndicators();

            } catch (e) {
                console.error('State fetch failed:', e);
            }
        }

        // Track token accumulation from current-session messages only (mirrors what AIs see)
        let tokenAccum = 0;
        let currentSessionId = null;
        function addTokenEstimate(msg) {
            // Only count tokens for messages in the current session (what AIs actually see)
            if (currentSessionId && msg.session_id != currentSessionId) return;
            tokenAccum += (msg.token_estimate || Math.ceil((msg.content || '').length / 4));
        }

        function updateTokenIndicators() {
            const contextMax = 200000; // Sonnet context window
            const personaOverhead = { Soren: 8000, Atlas: 8000 };
            const container = document.getElementById('token-indicators');
            if (!container) return;
            container.innerHTML = '';
            PARTICIPANTS_ACTIVE_AI.forEach(p => {
                const total = tokenAccum + (personaOverhead[p] || 0);
                const pct = Math.min(100, Math.round((total / contextMax) * 100));
                const bar = document.createElement('div');
                bar.className = 'token-bar';
                bar.title = `${p}: ~${Math.round(total/1000)}k / ${contextMax/1000}k tokens`;
                bar.innerHTML = `<span class="token-label">${p}</span><div class="token-track"><div class="token-fill" style="width:${pct}%"></div></div><span class="token-pct">${pct}%</span>`;
                container.appendChild(bar);
            });
        }

        function updateTypingIndicator(stateObj) {
            const active = [];

            // AI participants responding (status = busy)
            PARTICIPANTS_AI.forEach(p => {
                if ((stateObj['participant_status_' + p] || 'idle') === 'busy') active.push({ name: p, verb: 'responding' });
            });

            // Rob typing (recent keystroke within 5s)
            const robTypingAt = stateObj.rob_typing_at;
            if (robTypingAt) {
                const elapsed = Date.now() - new Date(robTypingAt.replace(/Z+$/, '') + 'Z').getTime();
                if (elapsed < 5000) active.push({ name: 'Rob', verb: 'typing' });
            }

            const wasVisible = !typingIndicator.classList.contains('hidden');

            if (active.length > 0) {
                let label;
                if (active.length === 1) {
                    label = `${active[0].name} is ${active[0].verb}`;
                } else {
                    const names = active.map(a => a.name).join(' & ');
                    label = `${names} are active`;
                }
                typingSender.textContent = label;
                typingIndicator.classList.remove('hidden');
                const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
                if (!wasVisible && nearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
            } else {
                typingIndicator.classList.add('hidden');
            }
        }

        // --- Lightweight markdown renderer (no external deps) ---
        function renderMarkdown(raw) {
            const esc = escapeHtml(raw);
            const lines = esc.split('\n');
            const out = [];
            let inCodeBlock = false;
            let codeLines = [];
            let codeLang = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Fenced code blocks
                if (line.match(/^```/)) {
                    if (inCodeBlock) {
                        out.push(`<pre><code class="lang-${codeLang}">${codeLines.join('\n')}</code></pre>`);
                        codeLines = [];
                        codeLang = '';
                        inCodeBlock = false;
                    } else {
                        inCodeBlock = true;
                        codeLang = line.slice(3).trim();
                    }
                    continue;
                }
                if (inCodeBlock) { codeLines.push(line); continue; }

                // Headers
                if (line.match(/^#{1,4}\s/)) {
                    const level = line.match(/^(#+)/)[1].length;
                    const text = inlineFormat(line.replace(/^#+\s*/, ''));
                    out.push(`<h${level + 2}>${text}</h${level + 2}>`);
                    continue;
                }

                // Bullet lists (- or * or numbered)
                if (line.match(/^\s*[-*]\s/)) {
                    const text = inlineFormat(line.replace(/^\s*[-*]\s/, ''));
                    out.push(`<div class="md-li">${text}</div>`);
                    continue;
                }
                if (line.match(/^\s*\d+\.\s/)) {
                    const text = inlineFormat(line.replace(/^\s*\d+\.\s/, ''));
                    out.push(`<div class="md-li md-ol">${text}</div>`);
                    continue;
                }

                // Blank line
                if (line.trim() === '') { out.push('<br>'); continue; }

                // Normal paragraph line
                out.push(inlineFormat(line));
                // Add <br> if next line is also a normal text line (not a block element)
                if (i + 1 < lines.length && lines[i + 1].trim() !== '' && !lines[i + 1].match(/^(```|#{1,4}\s|\s*[-*]\s|\s*\d+\.\s)/)) {
                    out.push('<br>');
                }
            }

            // Unclosed code block
            if (inCodeBlock) {
                out.push(`<pre><code>${codeLines.join('\n')}</code></pre>`);
            }

            return out.join('\n');
        }

        function inlineFormat(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')           // inline code
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')    // bold
                .replace(/\*(.+?)\*/g, '<em>$1</em>')                // italic
                .replace(MENTION_REGEX, '<span class="mention">@$1</span>');
        }

        let sessionDividerInserted = false;
        function renderMessage(msg) {
            // Insert session divider when transitioning from old messages to current session
            if (!sessionDividerInserted && currentSessionId && msg.session_id == currentSessionId) {
                if (messagesEl.children.length > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'session-divider';
                    divider.innerHTML = '<span>Current Session</span>';
                    messagesEl.appendChild(divider);
                }
                sessionDividerInserted = true;
            }

            const div = document.createElement('div');
            const sender = (msg.participant && msg.participant !== '') ? msg.participant : (msg.from || 'Unknown');
            const knownSenders = ['rob', 'soren', 'atlas', 'web', 'system', 'ellison'];
            const senderKey = sender.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const senderClass = knownSenders.includes(senderKey) ? `from-${senderKey}` : 'from-guest';
            div.className = `message ${senderClass}`;
            div.dataset.id = msg.id;
            div.dataset.timestamp = msg.timestamp;

            const dt = parseTimestamp(msg.timestamp);
            const time = dt ? dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            const contentHtml = renderMarkdown(msg.content);

            const safeMentions = (msg.mentions && msg.mentions.length > 0)
                ? msg.mentions.map(m => '@' + escapeHtml(m)).join(', ')
                : '';

            // Check if this is a tool approval request from System
            const isToolApproval = sender === 'System' && msg.content.includes('Tool access requested');

            // Render file attachments
            let attachmentsHtml = '';
            if (msg.attachments && msg.attachments.length > 0) {
                attachmentsHtml = '<div class="msg-attachments">' + msg.attachments.map(att => {
                    const isImage = att.mime_type && att.mime_type.startsWith('image/');
                    if (isImage) {
                        return `<div><img class="msg-attachment-image" src="uploads/${escapeHtml(att.filename)}" alt="${escapeHtml(att.original_name)}" onclick="window.open('uploads/${escapeHtml(att.filename)}', '_blank')" /></div>`;
                    }
                    return `<a class="msg-attachment" href="uploads/${escapeHtml(att.filename)}" target="_blank" download>
                        <span class="msg-attachment-icon">&#x1F4C4;</span>
                        <div class="msg-attachment-info">
                            <span class="msg-attachment-name">${escapeHtml(att.original_name)}</span>
                            <span class="msg-attachment-size">${formatFileSize(att.size_bytes)}</span>
                        </div>
                    </a>`;
                }).join('') + '</div>';
            }

            const avatarLetter = sender.charAt(0).toUpperCase();
            const avatarColorVar = knownSenders.includes(senderKey) ? `var(--${senderKey})` : 'var(--text-dim)';

            div.innerHTML = `
                <div class="msg-header">
                    <span class="msg-avatar" style="background: ${avatarColorVar}">${escapeHtml(avatarLetter)}</span>
                    <span class="msg-sender">${escapeHtml(sender)}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-content">${contentHtml}</div>
                ${attachmentsHtml}
                ${safeMentions ? `<div class="msg-mentions">&rarr; ${safeMentions}</div>` : ''}
                ${isToolApproval && currentSender === 'Rob' ? `<div class="tool-approval-buttons">
                    <button class="approve-btn" onclick="sendToolApproval('approve', this)">Approve</button>
                    <button class="deny-btn" onclick="sendToolApproval('deny', this)">Deny</button>
                </div>` : (isToolApproval ? '<div class="tool-approval-status">Awaiting Rob\'s approval</div>' : '')}
            `;

            // Reaction bar
            const reactionBar = document.createElement('div');
            reactionBar.className = 'reaction-bar';
            const reactionTrigger = document.createElement('button');
            reactionTrigger.className = 'reaction-trigger';
            reactionTrigger.textContent = '+';
            reactionTrigger.title = 'Add reaction';
            reactionTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                showReactionPicker(div, reactionBar);
            });
            reactionBar.appendChild(reactionTrigger);
            div.appendChild(reactionBar);

            messagesEl.appendChild(div);

            // Message grouping: hide header if same sender within 2 minutes
            const prev = div.previousElementSibling;
            if (prev && prev.querySelector('.msg-sender')?.textContent === sender) {
                const prevTime = parseTimestamp(prev.dataset.timestamp);
                if (prevTime && dt && (dt - prevTime) < 120000) {
                    div.classList.add('continuation');
                }
            }
        }

        const REACTIONS = ['\u{1F44D}', '\u2705', '\u{1F440}', '\u2753', '\u{1F3AF}', '\u{1F4A1}'];

        function showReactionPicker(msgEl, bar) {
            // Remove any existing picker
            document.querySelectorAll('.reaction-picker').forEach(p => p.remove());
            const picker = document.createElement('div');
            picker.className = 'reaction-picker';
            REACTIONS.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleReaction(msgEl, bar, emoji);
                    picker.remove();
                });
                picker.appendChild(btn);
            });
            bar.appendChild(picker);
            // Close picker on outside click
            setTimeout(() => {
                document.addEventListener('click', function closePicker() {
                    picker.remove();
                    document.removeEventListener('click', closePicker);
                }, { once: true });
            }, 0);
        }

        function toggleReaction(msgEl, bar, emoji) {
            const msgId = msgEl.dataset.id;
            // Check if reaction already exists
            let existing = bar.querySelector(`.reaction-chip[data-emoji="${emoji}"]`);
            if (existing) {
                existing.remove();
            } else {
                const chip = document.createElement('span');
                chip.className = 'reaction-chip';
                chip.dataset.emoji = emoji;
                chip.textContent = emoji;
                chip.addEventListener('click', () => chip.remove());
                bar.insertBefore(chip, bar.querySelector('.reaction-trigger'));
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function sendToolApproval(decision, btn) {
            const container = btn.parentElement;
            container.innerHTML = `<span class="tool-approval-status">${decision === 'approve' ? 'Approved' : 'Denied'}</span>`;
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: 'Rob', content: decision })
                });
            } catch (e) { console.error('Tool approval failed:', e); }
        }

        let flashTimeout = null;
        function flashTitle(text) {
            // Clear any existing flash + its safety timeout
            if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }

            let flashing = true;
            flashInterval = setInterval(() => {
                document.title = flashing ? text : originalTitle;
                flashing = !flashing;
            }, 500);
            flashTimeout = setTimeout(() => {
                if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
                flashTimeout = null;
                document.title = originalTitle;
            }, 15000);
            window.addEventListener('focus', () => {
                if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
                if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }
                document.title = originalTitle;
            }, { once: true });
        }

        // --- Presence heartbeat (sends every 10s while tab is focused) ---
        let heartbeatTimer = null;

        function sendHeartbeat() {
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'heartbeat', focused: document.hasFocus() })
            }).catch(() => {});
        }

        function startHeartbeat() {
            if (heartbeatTimer) return;
            sendHeartbeat(); // send immediately
            heartbeatTimer = setInterval(sendHeartbeat, 10000);
        }

        function stopHeartbeat() {
            // Send one last "unfocused" heartbeat, then stop
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'heartbeat', focused: false })
            }).catch(() => {});
            if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        }

        // Start/stop based on tab focus
        if (document.hasFocus()) startHeartbeat();
        window.addEventListener('focus', startHeartbeat);
        window.addEventListener('blur', stopHeartbeat);

        // --- Sidebar: fetch & render conversations ---
        async function fetchRooms() {
            try {
                const res = await fetch(`${API}?action=rooms&for=Rob`, {cache: 'no-store'});
                const data = await res.json();
                if (data.ok) {
                    rooms = data.rooms || [];
                    renderRoomList();
                }
            } catch (e) { /* non-critical */ }
        }

        function renderRoomList() {
            const list = document.getElementById('room-list');
            // Keep lobby entry
            const lobbyEntry = list.querySelector('[data-room-id="lobby"]');
            list.innerHTML = '';
            if (lobbyEntry) {
                lobbyEntry.classList.toggle('active', currentRoomId === null);
                lobbyEntry.onclick = () => switchToLobby();
                list.appendChild(lobbyEntry);
            }

            rooms.forEach(room => {
                const div = document.createElement('div');
                div.className = `room-item${currentRoomId === room.id ? ' active' : ''}`;
                div.dataset.roomId = room.id;

                const memberAvatars = (room.members || []).filter(m => m !== 'Rob').slice(0, 3).map(m => {
                    const key = m.toLowerCase();
                    return `<span class="room-member-dot" style="background: var(--${key}, var(--text-dim))" title="${m}">${m.charAt(0)}</span>`;
                }).join('');

                const time = room.last_message_at ? new Date(room.last_message_at.replace(/Z+$/, '') + 'Z').toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                const stateIcon = room.conversation_state === 'stopped' ? ' <span class="room-stopped" title="Paused">&#x23F8;</span>' : '';

                const hasUnread = room.last_message_at && currentRoomId !== room.id &&
                    (!lastViewedAtByRoom[room.id] || room.last_message_at > lastViewedAtByRoom[room.id]);

                div.innerHTML = `
                    <div class="room-avatar">&#x1F512;</div>
                    <div class="room-info">
                        <div class="room-name">${escapeHtml(room.name)}${stateIcon}</div>
                        <div class="room-preview">${escapeHtml(room.last_message_preview || 'No messages yet')}</div>
                    </div>
                    <div class="room-meta">
                        <div class="room-members-row">${memberAvatars}</div>
                        ${time ? `<span class="room-time">${time}</span>` : ''}
                        ${hasUnread ? '<span class="room-unread-dot"></span>' : ''}
                    </div>
                `;
                div.addEventListener('click', () => switchToRoom(room.id, room.name));
                list.appendChild(div);
            });
        }

        // --- View switching ---
        function switchToLobby() {
            // Mark previous room as viewed
            if (currentRoomId !== null) lastViewedAtByRoom[currentRoomId] = new Date().toISOString();
            currentRoomId = null;
            lastMessageId = lastMessageIdByRoom[null] || 0;
            tokenAccum = 0;
            sessionDividerInserted = false;
            messagesEl.innerHTML = '';
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-room-id="lobby"]')?.classList.add('active');

            document.getElementById('sender-select').style.display = '';
            document.getElementById('participant-status').style.display = '';
            document.getElementById('token-indicators').style.display = '';
            document.querySelector('#main-panel header h1').textContent = 'Claude Collab';

            fetchMessages();
            fetchState();
        }

        async function switchToRoom(roomId, roomName) {
            // Mark previous room/lobby as viewed
            if (currentRoomId !== null) lastViewedAtByRoom[currentRoomId] = new Date().toISOString();
            currentRoomId = roomId;
            lastViewedAtByRoom[roomId] = new Date().toISOString();
            lastMessageId = lastMessageIdByRoom[roomId] || 0;
            tokenAccum = 0;
            sessionDividerInserted = false;
            messagesEl.innerHTML = '';
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-room-id="${roomId}"]`)?.classList.add('active');

            // Show sender buttons in rooms too (Rob can send as himself)
            document.getElementById('sender-select').style.display = '';
            document.getElementById('participant-status').style.display = 'none';
            document.getElementById('token-indicators').style.display = '';
            document.querySelector('#main-panel header h1').textContent = roomName;

            // Reset and fetch room messages
            lastMessageId = 0;
            lastMessageIdByRoom[roomId] = 0;
            await fetchMessages();
        }

        // --- File upload (drag/drop + button) ---
        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            addFiles(Array.from(fileInput.files));
            fileInput.value = '';
        });

        // Drag and drop on the entire input area
        const inputArea = document.getElementById('input-area');
        inputArea.style.position = 'relative';

        inputArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropOverlay.classList.remove('hidden');
        });
        inputArea.addEventListener('dragleave', (e) => {
            if (!inputArea.contains(e.relatedTarget)) dropOverlay.classList.add('hidden');
        });
        inputArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropOverlay.classList.add('hidden');
            addFiles(Array.from(e.dataTransfer.files));
        });

        function addFiles(files) {
            for (const file of files) {
                if (file.size > MAX_FILE_SIZE) {
                    if (!confirm(`${file.name} is ${formatFileSize(file.size)} (max ${formatFileSize(MAX_FILE_SIZE)}). Upload anyway?`)) continue;
                }
                pendingFiles.push(file);
            }
            renderFilePreview();
        }

        function renderFilePreview() {
            filePreview.innerHTML = '';
            if (pendingFiles.length === 0) {
                filePreview.classList.add('hidden');
                return;
            }
            filePreview.classList.remove('hidden');
            pendingFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'file-preview-item';
                item.innerHTML = `
                    <span>${escapeHtml(file.name)} (${formatFileSize(file.size)})</span>
                    <span class="file-remove" data-idx="${i}">&times;</span>
                `;
                item.querySelector('.file-remove').addEventListener('click', () => {
                    pendingFiles.splice(i, 1);
                    renderFilePreview();
                });
                filePreview.appendChild(item);
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        async function uploadFiles(messageId) {
            for (const file of pendingFiles) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('action', 'upload');
                formData.append('uploaded_by', currentSender);
                formData.append('message_id', messageId);
                if (file.size > MAX_FILE_SIZE) {
                    formData.append('override_cap', 'true');
                }
                try {
                    await fetch(API, { method: 'POST', body: formData });
                } catch (e) { console.error('Upload failed:', e); }
            }
            pendingFiles = [];
            renderFilePreview();
        }

        // --- New Room modal ---
        document.getElementById('new-room-btn').addEventListener('click', () => {
            renderRoomModal();
            document.getElementById('new-room-modal').classList.remove('hidden');
            document.getElementById('room-name-input').focus();
        });

        function renderRoomModal() {
            const container = document.getElementById('room-member-checkboxes');
            container.innerHTML = '';
            PARTICIPANTS_ALL.filter(p => p !== 'Rob').forEach(p => {
                const key = p.toLowerCase();
                const checked = PARTICIPANTS_ACTIVE_AI.includes(p) ? 'checked' : '';
                const label = document.createElement('label');
                label.className = 'member-checkbox';
                label.innerHTML = `
                    <input type="checkbox" value="${p}" ${checked} />
                    <span class="member-avatar" style="background: var(--${key}, var(--text-dim))">${p.charAt(0)}</span>
                    <span>${escapeHtml(p)}</span>
                `;
                container.appendChild(label);
            });
            document.getElementById('room-name-input').value = '';
        }

        document.getElementById('room-create-btn').addEventListener('click', async () => {
            const name = document.getElementById('room-name-input').value.trim();
            if (!name) { document.getElementById('room-name-input').focus(); return; }

            const checkboxes = document.querySelectorAll('#room-member-checkboxes input:checked');
            const members = ['Rob', ...Array.from(checkboxes).map(cb => cb.value)];

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'create_room', name, members})
                });
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('new-room-modal').classList.add('hidden');
                    await fetchRooms();
                    switchToRoom(data.room.id, data.room.name);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) { console.error('Create room failed:', e); }
        });

        document.getElementById('room-cancel-btn').addEventListener('click', () => {
            document.getElementById('new-room-modal').classList.add('hidden');
        });

        // Close modal on backdrop click
        document.getElementById('new-room-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.add('hidden');
            }
        });

        // --- Polling (with overlap guard + visibility catch-up + auto-start) ---
        async function startPolling(intervalMs = 2000) {
            await fetchState(); // Must run first so currentSessionId is set before rendering messages
            await fetchMessages();
            await fetchRooms();

            // Auto-start session if not active
            if (!sessionActive) {
                try {
                    await fetch(API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'session', state: 'active' })
                    });
                    await fetch(API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ from: 'System', content: 'Session auto-started.' })
                    });
                    await fetchState();
                    await fetchMessages();
                } catch (e) { console.error('Auto-start failed:', e); }
            }

            setInterval(async () => {
                if (isPolling) return;
                isPolling = true;
                try {
                    await fetchMessages();
                    await fetchState();
                    fetchRooms(); // Always refresh sidebar (non-blocking)
                } finally {
                    isPolling = false;
                }
            }, intervalMs);

            // Catch up immediately when tab becomes visible (Chrome throttles bg tabs)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && !isPolling) {
                    fetchMessages();
                    fetchState();
                    fetchRooms();
                }
            });
        }

        startPolling();
    </script>
</body>
