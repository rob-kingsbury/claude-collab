<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Collab Chatroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div id="header-left">
                <h1>Claude Collab</h1>
                <button id="history-toggle" class="history-btn" title="Toggle between current session and all messages">This session</button>
            </div>
            <div id="status-bar">
                <span id="connection-status" class="status-dot online"></span>
                <span id="session-badge" class="badge paused">SESSION OFF</span>
                <span id="message-count">0 messages</span>
                <span id="exchange-count"></span>
                <span id="watcher-status" class="watcher-badge stopped" title="Watcher process status">W: stopped</span>
            </div>
            <div id="session-controls">
                <button id="watcher-btn" class="control-btn watcher-ctl" title="Start/restart watcher">W</button>
                <button id="session-toggle" class="control-btn startup">STARTUP</button>
            </div>
        </header>

        <div id="search-bar" class="hidden">
            <input type="text" id="search-input" placeholder="Search messages..." />
            <span id="search-count"></span>
            <button id="search-close">&times;</button>
        </div>

        <main id="chat-container">
            <div id="messages"></div>
            <div id="typing-indicator" class="typing-indicator hidden">
                <span class="typing-sender"></span>
                <span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
            </div>
        </main>

        <footer id="input-area">
            <div id="sender-select">
                <button class="sender-btn active" data-sender="Rob">Rob</button>
                <button class="sender-btn" data-sender="Soren">Soren</button>
                <button class="sender-btn" data-sender="Atlas">Atlas</button>
                <button class="sender-btn" data-sender="Web">Web</button>
                <button class="sender-btn guest-btn" data-sender="Guest">Guest</button>
                <input type="text" id="guest-handle" class="hidden" placeholder="Handle..." maxlength="20" />
            </div>
            <div id="compose">
                <div id="mention-wrapper">
                    <textarea id="message-input" placeholder="Type a message... Type @ to mention someone." rows="3"></textarea>
                    <div id="mention-popup" class="mention-popup hidden"></div>
                </div>
                <button id="send-btn">Send</button>
            </div>
            <div id="participant-status"></div>
        </footer>
    </div>

    <!-- New message notification sound (short beep via Web Audio API) -->
    <script>
        const API = 'api.php';
        let currentSender = 'Rob';
        let lastMessageId = 0;
        let isPolling = false;
        let flashInterval = null;
        let typingTimer = null;
        const originalTitle = document.title;
        let currentSessionFilter = 'current'; // 'current', 'all', or session ID

        // --- DOM refs ---
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const countEl = document.getElementById('message-count');
        const exchangeEl = document.getElementById('exchange-count');
        const statusDot = document.getElementById('connection-status');
        const sessionBadge = document.getElementById('session-badge');
        const sessionToggle = document.getElementById('session-toggle');
        const participantStatusEl = document.getElementById('participant-status');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingSender = typingIndicator.querySelector('.typing-sender');
        const historyToggle = document.getElementById('history-toggle');
        const watcherStatus = document.getElementById('watcher-status');
        const watcherBtn = document.getElementById('watcher-btn');
        const searchBar = document.getElementById('search-bar');
        const searchInput = document.getElementById('search-input');
        const searchCount = document.getElementById('search-count');
        const searchClose = document.getElementById('search-close');
        let sessionActive = false;
        const senderBtns = document.querySelectorAll('.sender-btn');

        // --- Request notification permission on first click ---
        if (typeof Notification !== 'undefined') {
            document.addEventListener('click', function requestNotifPerm() {
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
                document.removeEventListener('click', requestNotifPerm);
            });
        }

        // --- Taskbar flash via Web Notification ---
        function flashTaskbar(sender, text) {
            if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
            const n = new Notification('Claude Collab — ' + sender, {
                body: text.length > 100 ? text.slice(0, 100) + '...' : text,
                tag: 'claude-collab-msg',
                requireInteraction: false
            });
            n.onclick = () => { window.focus(); n.close(); };
            setTimeout(() => n.close(), 8000);
        }

        // --- Notification sound (short beep, reuse AudioContext) ---
        let audioCtx = null;
        function playNotificationSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) { /* Audio not available */ }
        }

        // --- Sender selection ---
        const guestHandleInput = document.getElementById('guest-handle');
        let guestMode = false;

        function exitGuestMode() {
            guestMode = false;
            guestHandleInput.classList.add('hidden');
            guestHandleInput.value = '';
            document.querySelector('.guest-btn').textContent = 'Guest';
        }

        senderBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.sender === 'Guest') {
                    if (guestMode) {
                        // Toggle off — back to Rob
                        exitGuestMode();
                        senderBtns.forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-sender="Rob"]').classList.add('active');
                        currentSender = 'Rob';
                    } else {
                        // Enter guest mode
                        guestMode = true;
                        senderBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        btn.textContent = 'Exit Guest';
                        guestHandleInput.classList.remove('hidden');
                        guestHandleInput.focus();
                        currentSender = 'Guest';
                    }
                } else {
                    if (guestMode) exitGuestMode();
                    senderBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSender = btn.dataset.sender;
                }
                inputEl.focus();
            });
        });

        guestHandleInput.addEventListener('input', () => {
            const handle = guestHandleInput.value.trim();
            currentSender = handle ? `${handle} [Guest]` : 'Guest';
        });

        guestHandleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); inputEl.focus(); }
            if (e.key === 'Escape') {
                exitGuestMode();
                senderBtns.forEach(b => b.classList.remove('active'));
                document.querySelector('[data-sender="Rob"]').classList.add('active');
                currentSender = 'Rob';
                inputEl.focus();
            }
        });

        // --- Session toggle (with confirmation for ending) ---
        sessionToggle.addEventListener('click', async () => {
            const newState = sessionActive ? 'paused' : 'active';
            if (sessionActive && !confirm('End the current session? This will close the session and pause all AI participants.')) return;
            const msg = sessionActive ? 'Session stopped by Rob.' : 'Session started by Rob.';
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'session', state: newState, close_session: newState === 'paused' })
                });
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: 'System', content: msg })
                });
                fetchState();
                fetchMessages();
            } catch (e) { console.error('Session toggle failed:', e); }
        });

        // --- History toggle (this session / all) ---
        historyToggle.addEventListener('click', async () => {
            currentSessionFilter = currentSessionFilter === 'current' ? 'all' : 'current';
            historyToggle.textContent = currentSessionFilter === 'current' ? 'This session' : 'All history';
            historyToggle.classList.toggle('showing-all', currentSessionFilter === 'all');
            messagesEl.innerHTML = '';
            lastMessageId = 0;
            await fetchMessages();
        });

        // --- Watcher controls ---
        watcherBtn.addEventListener('click', async () => {
            const action = watcherBtn.dataset.running === 'true' ? 'restart' : 'start';
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'watcher_control', command: action })
                });
                watcherStatus.textContent = 'W: starting...';
            } catch (e) { console.error('Watcher control failed:', e); }
        });

        // --- Search (Ctrl+F override for in-chat search) ---
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                searchBar.classList.remove('hidden');
                searchInput.focus();
                searchInput.select();
            }
        });

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase().trim();
            const msgs = messagesEl.querySelectorAll('.message');
            let matchCount = 0;
            msgs.forEach(el => {
                const text = el.textContent.toLowerCase();
                if (q === '' || text.includes(q)) {
                    el.style.display = '';
                    if (q !== '') matchCount++;
                } else {
                    el.style.display = 'none';
                }
            });
            searchCount.textContent = q ? `${matchCount} match${matchCount !== 1 ? 'es' : ''}` : '';
        });

        searchClose.addEventListener('click', () => {
            searchBar.classList.add('hidden');
            searchInput.value = '';
            messagesEl.querySelectorAll('.message').forEach(el => el.style.display = '');
            searchCount.textContent = '';
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') searchClose.click();
        });

        // --- Typing indicator (Rob priority enforcement, throttled to 1 POST per 3s) ---
        let lastTypingSent = 0;
        inputEl.addEventListener('input', () => {
            if (currentSender === 'Rob') {
                const now = Date.now();
                if (now - lastTypingSent < 3000) return;
                lastTypingSent = now;
                fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'typing', participant: 'Rob' })
                }).catch(() => {});
            }
        });

        // --- @mention autocomplete ---
        const mentionNames = ['Rob', 'Soren', 'Atlas', 'all', 'Web', 'Ellison'];
        const mentionPopup = document.getElementById('mention-popup');
        let mentionStart = -1; // cursor position of the '@'
        let mentionSelected = 0;

        function getMentionQuery() {
            const pos = inputEl.selectionStart;
            const text = inputEl.value.substring(0, pos);
            const atIdx = text.lastIndexOf('@');
            if (atIdx === -1) return null;
            // '@' must be at start or after whitespace
            if (atIdx > 0 && !/\s/.test(text[atIdx - 1])) return null;
            const query = text.substring(atIdx + 1);
            // No spaces allowed in mention query
            if (/\s/.test(query)) return null;
            return { start: atIdx, query };
        }

        function showMentionPopup(filtered) {
            mentionPopup.innerHTML = '';
            filtered.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'mention-option' + (i === mentionSelected ? ' selected' : '');
                div.textContent = '@' + name;
                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    insertMention(name);
                });
                mentionPopup.appendChild(div);
            });
            mentionPopup.classList.remove('hidden');
        }

        function hideMentionPopup() {
            mentionPopup.classList.add('hidden');
            mentionStart = -1;
            mentionSelected = 0;
        }

        function insertMention(name) {
            const info = getMentionQuery();
            if (!info) return;
            const before = inputEl.value.substring(0, info.start);
            const after = inputEl.value.substring(inputEl.selectionStart);
            inputEl.value = before + '@' + name + ' ' + after;
            const newPos = info.start + name.length + 2; // after "@Name "
            inputEl.selectionStart = inputEl.selectionEnd = newPos;
            hideMentionPopup();
            inputEl.focus();
        }

        inputEl.addEventListener('input', () => {
            const info = getMentionQuery();
            if (info) {
                const q = info.query.toLowerCase();
                const filtered = mentionNames.filter(n => n.toLowerCase().startsWith(q));
                if (filtered.length > 0) {
                    mentionSelected = Math.min(mentionSelected, filtered.length - 1);
                    showMentionPopup(filtered);
                    return;
                }
            }
            hideMentionPopup();
        });

        inputEl.addEventListener('keydown', (e) => {
            if (mentionPopup.classList.contains('hidden')) return;
            const options = mentionPopup.querySelectorAll('.mention-option');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                mentionSelected = (mentionSelected + 1) % options.length;
                options.forEach((o, i) => o.classList.toggle('selected', i === mentionSelected));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                mentionSelected = (mentionSelected - 1 + options.length) % options.length;
                options.forEach((o, i) => o.classList.toggle('selected', i === mentionSelected));
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                if (options.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    const name = options[mentionSelected].textContent.slice(1); // remove '@'
                    insertMention(name);
                }
            } else if (e.key === 'Escape') {
                hideMentionPopup();
            }
        });

        inputEl.addEventListener('blur', () => {
            // Delay so mousedown on popup option fires first
            setTimeout(hideMentionPopup, 150);
        });

        // --- Send message ---
        async function sendMessage() {
            const content = inputEl.value.trim();
            if (!content) return;

            sendBtn.disabled = true;
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: currentSender, content })
                });
                const data = await res.json();
                if (data.ok) {
                    inputEl.value = '';
                    await fetchMessages();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                console.error('Send failed:', e);
                statusDot.className = 'status-dot offline';
            } finally {
                sendBtn.disabled = false;
                inputEl.blur();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // --- Parse timestamp (handles both Z-terminated and bare UTC) ---
        function parseTimestamp(ts) {
            if (!ts) return null;
            // Strip trailing Z if present, then add it back once
            const clean = ts.replace(/Z+$/, '') + 'Z';
            const d = new Date(clean);
            return isNaN(d.getTime()) ? null : d;
        }

        // --- Fetch & render messages ---
        async function fetchMessages() {
            try {
                let url = `${API}?action=messages&since=${lastMessageId}`;
                if (currentSessionFilter === 'current') url += '&session=current';
                else if (currentSessionFilter !== 'all') url += `&session=${currentSessionFilter}`;
                const res = await fetch(url, {cache: 'no-store'});
                const data = await res.json();
                // Status dot reflects connection health, not session state (fetchState handles session)
                if (data.ok) statusDot.className = 'status-dot online';

                if (data.ok && data.messages && data.messages.length > 0) {
                    // Check if user is near bottom before appending
                    const wasNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;

                    data.messages.forEach(renderMessage);
                    lastMessageId = data.messages[data.messages.length - 1].id;

                    // Only auto-scroll if user was already near the bottom
                    if (wasNearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;

                    // Notify: blink tab + sound + taskbar flash if window not focused
                    if (!document.hasFocus()) {
                        const otherMsg = data.messages.find(m => (m.participant || m.from) !== currentSender);
                        if (otherMsg) {
                            flashTitle('New message!');
                            playNotificationSound();
                            flashTaskbar(otherMsg.participant || otherMsg.from, otherMsg.content);
                        }
                    }

                    // Blink the new messages
                    data.messages.forEach(m => {
                        const el = messagesEl.querySelector(`[data-id="${m.id}"]`);
                        if (el) {
                            el.classList.add('new-message');
                            setTimeout(() => el.classList.remove('new-message'), 2000);
                        }
                    });
                }

                if (data.total !== undefined) {
                    countEl.textContent = data.total + ' messages';
                }
            } catch (e) {
                console.error('Poll failed:', e);
                statusDot.className = 'status-dot offline';
            }
        }

        // --- Fetch session state (every 5th poll = ~15s) ---
        async function fetchState() {
            try {
                const res = await fetch(`${API}?action=state`, {cache: 'no-store'});
                const data = await res.json();
                if (!data.ok) return;

                const s = data.state;
                const active = s.session_active === 'true';
                sessionActive = active;
                sessionBadge.textContent = active ? 'SESSION ACTIVE' : 'SESSION OFF';
                sessionBadge.className = 'badge ' + (active ? 'active' : 'paused');
                statusDot.className = 'status-dot ' + (active ? 'online' : 'offline');
                sessionToggle.textContent = active ? 'END SESSION' : 'STARTUP';
                sessionToggle.className = 'control-btn ' + (active ? 'stop' : 'startup');

                const robPresent = s.rob_focused === 'true';
                const convState = s.conversation_state || 'active';
                if (active) {
                    exchangeEl.textContent = robPresent ? 'Rob: present' : `Rob: away (${convState})`;
                    exchangeEl.className = robPresent ? 'presence-on' : 'presence-off';
                } else {
                    exchangeEl.textContent = '';
                }

                participantStatusEl.innerHTML = '';
                ['Soren', 'Atlas', 'Web', 'Ellison'].forEach(p => {
                    const st = (s['participant_status_' + p] || 'idle').replace(/[^a-z]/g, '');
                    const span = document.createElement('span');
                    span.className = `p-status ${st}`;
                    span.textContent = `${p}: ${st}`;
                    participantStatusEl.appendChild(span);
                });

                // Watcher status
                const watcherHb = s.watcher_heartbeat_at;
                let watcherAlive = false;
                if (watcherHb) {
                    const elapsed = Date.now() - new Date(watcherHb.replace(/Z+$/, '') + 'Z').getTime();
                    watcherAlive = elapsed < 15000; // alive if heartbeat within 15s
                }
                watcherStatus.textContent = watcherAlive ? `W: running` : 'W: stopped';
                watcherStatus.className = `watcher-badge ${watcherAlive ? 'running' : 'stopped'}`;
                watcherBtn.textContent = watcherAlive ? 'W restart' : 'W start';
                watcherBtn.dataset.running = watcherAlive ? 'true' : 'false';
                watcherBtn.className = `control-btn watcher-ctl ${watcherAlive ? 'running' : ''}`;

                updateTypingIndicator(s);

            } catch (e) {
                console.error('State fetch failed:', e);
            }
        }

        function updateTypingIndicator(stateObj) {
            const active = [];

            // AI participants responding (status = busy)
            ['Soren', 'Atlas', 'Web', 'Ellison'].forEach(p => {
                if ((stateObj['participant_status_' + p] || 'idle') === 'busy') active.push({ name: p, verb: 'responding' });
            });

            // Rob typing (recent keystroke within 5s)
            const robTypingAt = stateObj.rob_typing_at;
            if (robTypingAt) {
                const elapsed = Date.now() - new Date(robTypingAt.replace(/Z+$/, '') + 'Z').getTime();
                if (elapsed < 5000) active.push({ name: 'Rob', verb: 'typing' });
            }

            const wasVisible = !typingIndicator.classList.contains('hidden');

            if (active.length > 0) {
                let label;
                if (active.length === 1) {
                    label = `${active[0].name} is ${active[0].verb}`;
                } else {
                    const names = active.map(a => a.name).join(' & ');
                    label = `${names} are active`;
                }
                typingSender.textContent = label;
                typingIndicator.classList.remove('hidden');
                const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
                if (!wasVisible && nearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
            } else {
                typingIndicator.classList.add('hidden');
            }
        }

        // --- Lightweight markdown renderer (no external deps) ---
        function renderMarkdown(raw) {
            const esc = escapeHtml(raw);
            const lines = esc.split('\n');
            const out = [];
            let inCodeBlock = false;
            let codeLines = [];
            let codeLang = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Fenced code blocks
                if (line.match(/^```/)) {
                    if (inCodeBlock) {
                        out.push(`<pre><code class="lang-${codeLang}">${codeLines.join('\n')}</code></pre>`);
                        codeLines = [];
                        codeLang = '';
                        inCodeBlock = false;
                    } else {
                        inCodeBlock = true;
                        codeLang = line.slice(3).trim();
                    }
                    continue;
                }
                if (inCodeBlock) { codeLines.push(line); continue; }

                // Headers
                if (line.match(/^#{1,4}\s/)) {
                    const level = line.match(/^(#+)/)[1].length;
                    const text = inlineFormat(line.replace(/^#+\s*/, ''));
                    out.push(`<h${level + 2}>${text}</h${level + 2}>`);
                    continue;
                }

                // Bullet lists (- or * or numbered)
                if (line.match(/^\s*[-*]\s/)) {
                    const text = inlineFormat(line.replace(/^\s*[-*]\s/, ''));
                    out.push(`<div class="md-li">${text}</div>`);
                    continue;
                }
                if (line.match(/^\s*\d+\.\s/)) {
                    const text = inlineFormat(line.replace(/^\s*\d+\.\s/, ''));
                    out.push(`<div class="md-li md-ol">${text}</div>`);
                    continue;
                }

                // Blank line
                if (line.trim() === '') { out.push('<br>'); continue; }

                // Normal paragraph line
                out.push(inlineFormat(line));
                // Add <br> if next line is also a normal text line (not a block element)
                if (i + 1 < lines.length && lines[i + 1].trim() !== '' && !lines[i + 1].match(/^(```|#{1,4}\s|\s*[-*]\s|\s*\d+\.\s)/)) {
                    out.push('<br>');
                }
            }

            // Unclosed code block
            if (inCodeBlock) {
                out.push(`<pre><code>${codeLines.join('\n')}</code></pre>`);
            }

            return out.join('\n');
        }

        function inlineFormat(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')           // inline code
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')    // bold
                .replace(/\*(.+?)\*/g, '<em>$1</em>')                // italic
                .replace(/@(Rob|Soren|Atlas|Web|Ellison|all)\b/gi, '<span class="mention">@$1</span>');
        }

        function renderMessage(msg) {
            const div = document.createElement('div');
            const sender = (msg.participant && msg.participant !== '') ? msg.participant : (msg.from || 'Unknown');
            const knownSenders = ['rob', 'soren', 'atlas', 'web', 'system', 'ellison'];
            const senderKey = sender.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const senderClass = knownSenders.includes(senderKey) ? `from-${senderKey}` : 'from-guest';
            div.className = `message ${senderClass}`;
            div.dataset.id = msg.id;

            const dt = parseTimestamp(msg.timestamp);
            const time = dt ? dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            const contentHtml = renderMarkdown(msg.content);

            const safeMentions = (msg.mentions && msg.mentions.length > 0)
                ? msg.mentions.map(m => '@' + escapeHtml(m)).join(', ')
                : '';

            // Check if this is a tool approval request from System
            const isToolApproval = sender === 'System' && msg.content.includes('Tool access requested');

            div.innerHTML = `
                <div class="msg-header">
                    <span class="msg-sender">${escapeHtml(sender)}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-content">${contentHtml}</div>
                ${safeMentions ? `<div class="msg-mentions">&rarr; ${safeMentions}</div>` : ''}
                ${isToolApproval ? `<div class="tool-approval-buttons">
                    <button class="approve-btn" onclick="sendToolApproval('approve', this)">Approve</button>
                    <button class="deny-btn" onclick="sendToolApproval('deny', this)">Deny</button>
                </div>` : ''}
            `;

            messagesEl.appendChild(div);
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function sendToolApproval(decision, btn) {
            const container = btn.parentElement;
            container.innerHTML = `<span class="tool-approval-status">${decision === 'approve' ? 'Approved' : 'Denied'}</span>`;
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: 'Rob', content: decision })
                });
            } catch (e) { console.error('Tool approval failed:', e); }
        }

        let flashTimeout = null;
        function flashTitle(text) {
            // Clear any existing flash + its safety timeout
            if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }

            let flashing = true;
            flashInterval = setInterval(() => {
                document.title = flashing ? text : originalTitle;
                flashing = !flashing;
            }, 500);
            flashTimeout = setTimeout(() => {
                if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
                flashTimeout = null;
                document.title = originalTitle;
            }, 15000);
            window.addEventListener('focus', () => {
                if (flashInterval) { clearInterval(flashInterval); flashInterval = null; }
                if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }
                document.title = originalTitle;
            }, { once: true });
        }

        // --- Presence heartbeat (sends every 10s while tab is focused) ---
        let heartbeatTimer = null;

        function sendHeartbeat() {
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'heartbeat', focused: document.hasFocus() })
            }).catch(() => {});
        }

        function startHeartbeat() {
            if (heartbeatTimer) return;
            sendHeartbeat(); // send immediately
            heartbeatTimer = setInterval(sendHeartbeat, 10000);
        }

        function stopHeartbeat() {
            // Send one last "unfocused" heartbeat, then stop
            fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'heartbeat', focused: false })
            }).catch(() => {});
            if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        }

        // Start/stop based on tab focus
        if (document.hasFocus()) startHeartbeat();
        window.addEventListener('focus', startHeartbeat);
        window.addEventListener('blur', stopHeartbeat);

        // --- Polling (with overlap guard + visibility catch-up + auto-start) ---
        async function startPolling(intervalMs = 2000) {
            await fetchMessages();
            await fetchState();

            // Auto-start session if not active
            if (!sessionActive) {
                try {
                    await fetch(API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'session', state: 'active' })
                    });
                    await fetch(API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ from: 'System', content: 'Session auto-started.' })
                    });
                    await fetchState();
                    await fetchMessages();
                } catch (e) { console.error('Auto-start failed:', e); }
            }

            setInterval(async () => {
                if (isPolling) return;
                isPolling = true;
                try {
                    await fetchMessages();
                    await fetchState();
                } finally {
                    isPolling = false;
                }
            }, intervalMs);

            // Catch up immediately when tab becomes visible (Chrome throttles bg tabs)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && !isPolling) {
                    fetchMessages();
                    fetchState();
                }
            });
        }

        startPolling();
    </script>
